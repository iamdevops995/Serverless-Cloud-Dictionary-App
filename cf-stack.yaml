AWSTemplateFormatVersion: '2010-09-09'
Description: Serverless cloud Dictionary Application Infra Creation

Resources:
  awsDynamoDB:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: CloudDefinitions
      AttributeDefinitions:
        - AttributeName: term
          AttributeType: S
      KeySchema:
        - AttributeName: term
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AmazonDynamoDBFullAccess
        - arn:aws:iam::aws:policy/service-role/AWSLambdaDynamoDBExecutionRole
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
  awsLambdaFunc:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: CloudDefinitions
      Runtime: python3.12
      Role: !GetAtt LambdaExecutionRole.Arn
      Handler: index.handler
      Timeout: 120
      Code:
        S3Bucket: clouddefinitions-lambda-functions
        S3Key: serverless-app.zip
      Environment:
        Variables:
          STAGE: dev
          TABLE_NAME: CloudDefinitions

  apiGatewayForLambda:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: serverlessRestAPIs
      Description: REST API for dictionary definitions
      EndpointConfiguration:
        Types:
          - REGIONAL

  apiGatewayResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref apiGatewayForLambda
      ParentId: !GetAtt apiGatewayForLambda.RootResourceId
      PathPart: get-definition

  apiGatewayMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref apiGatewayForLambda
      ResourceId: !Ref apiGatewayResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${awsLambdaFunc.Arn}/invocations

  MyApiDeployment:
    Type: AWS::ApiGateway::Deployment
    Properties:
      RestApiId: !Ref apiGatewayForLambda
      StageName: dev
    DependsOn: apiGatewayMethod

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref awsLambdaFunc
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${apiGatewayForLambda}/*/GET/get-definition

Outputs:
  ApiGatewayInvokeURL:
    Description: "Invoke URL for the dictionary API"
    Value: !Sub "https://${apiGatewayForLambda}.execute-api.${AWS::Region}.amazonaws.com/dev"